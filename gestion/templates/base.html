<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alke Wallet</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#e0f7ff,#ffffff);
}

nav {
    background:#0a2540;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

nav a {
    color:white;
    text-decoration:none;
    margin-right:10px;
    font-weight:bold;
}

.logout {
    background:#ff4d4d;
    padding:6px 10px;
    border-radius:6px;
    color:white;
}

.container { padding:20px; }

.card {
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
}
</style>

</head>

<body>

<nav>
<div>
<a href="{% url 'home' %}">Alke Wallet</a>
<a href="{% url 'home' %}">Inicio</a>
<a href="{% url 'transaccion_create' %}">Enviar</a>
<a href="{% url 'deposito_create' %}">Depositar</a>
</div>

<div>
{% if user.is_authenticated %}

    <span style="color:white; margin-right:10px;">
        {{ user.username }}
    </span>

    <a href="{% url 'beneficiario_list' %}">Beneficiarios</a>
    <a href="{% url 'moneda_list' %}">Monedas</a>
    <a href="{% url 'usuario_list' %}">Usuarios</a>

    <form method="post" action="{% url 'logout' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="logout" style="border:none; cursor:pointer;">
            Cerrar sesión
        </button>
    </form>

{% else %}

    <a href="{% url 'login' %}">Iniciar sesión</a>
    <a href="{% url 'register' %}">Registrarse</a>

{% endif %}
</div>
</nav>

<div class="container">
{% block content %}{% endblock %}
</div>

</body>
</html>
