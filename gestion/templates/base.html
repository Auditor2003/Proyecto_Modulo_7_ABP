<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Alke Wallet</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e0f7ff, #ffffff);
        }

        /* NAVBAR */
        nav {
            background-color: #0a2540;
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 8px;
            transition: 0.2s;
        }

        nav a:hover {
            background-color: #2ec4ff;
            color: #0a2540;
        }

        /* Separador visual */
        hr {
            border: none;
            height: 1px;
            background-color: #ccc;
            margin: 0;
        }

        /* MENSAJES */
        .mensaje {
            padding: 12px;
            margin: 15px 20px;
            border-radius: 8px;
            font-weight: bold;
        }

        .mensaje.success {
            background-color: #d4edda;
            color: #155724;
        }

        .mensaje.error {
            background-color: #f8d7da;
            color: #721c24;
        }

        .mensaje.info {
            background-color: #d1ecf1;
            color: #0c5460;
        }

        /* CONTENIDO */
        .container {
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR NUEVO -->
<nav>

    <!-- PRINCIPAL -->
    <a href="#">🏠 Inicio</a>
    <a href="{% url 'transaccion_create' %}">💸 Enviar</a>
    <a href="{% url 'deposito_create' %}">💰 Depositar</a>
    <a href="{% url 'transaccion_list' %}">📊 Movimientos</a>

    <!-- GESTIÓN -->
    <a href="{% url 'beneficiario_list' %}">👥 Beneficiarios</a>
    <a href="{% url 'moneda_list' %}">💱 Monedas</a>

    <!-- USUARIO -->
    <a href="{% url 'usuario_list' %}">👤 Usuarios</a>
</nav>

<hr>

<!-- MENSAJES -->
{% if messages %}
    {% for message in messages %}
        <div class="mensaje 
            {% if message.tags == 'success' %}success
            {% elif message.tags == 'error' %}error
            {% else %}info{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<!-- CONTENIDO -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
