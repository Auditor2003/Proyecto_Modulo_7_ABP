{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h2>Beneficiarios</h2>

    <a href="{% url 'beneficiario_create' %}" class="nav-btn primary">
        + Crear beneficiario
    </a>

    <ul style="margin-top:20px; padding:0; list-style:none;">
        {% for b in beneficiarios %}
        <li style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #eee;">

            <span>{{ b.nombre }}</span>

            <div style="display:flex; gap:8px;">

                <a href="{% url 'beneficiario_update' b.pk %}" 
                   class="nav-btn primary">
                    Editar
                </a>

                <form action="{% url 'beneficiario_delete' b.pk %}" method="post" style="margin:0;">
                    {% csrf_token %}
                    <button class="nav-btn danger">
                        Eliminar
                    </button>
                </form>

            </div>

        </li>

        {% empty %}
        <li style="margin-top:10px;">No hay beneficiarios registrados</li>
        {% endfor %}
    </ul>

</div>

{% endblock %}
