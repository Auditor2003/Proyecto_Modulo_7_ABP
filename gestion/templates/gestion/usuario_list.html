<!DOCTYPE html>
<html>
<head>
    <title>Lista de Usuarios</title>
</head>
<body>

    <h1>Usuarios</h1>

    <!-- Aquí dejo un enlace para crear un nuevo usuario -->
    <a href="{% url 'usuario_create' %}">Crear nuevo usuario</a>

    <br><br>

    <ul>
        {% for usuario in usuarios %}
            <li>
                {{ usuario.nombre }} - {{ usuario.correo_electronico }} - Saldo: {{ usuario.saldo }}

                <!-- Botón editar -->
                <a href="{% url 'usuario_update' usuario.pk %}">Editar</a>

                <!-- Botón eliminar -->
                <a href="{% url 'usuario_delete' usuario.pk %}">Eliminar</a>
            </li>
        {% empty %}
            <li>No hay usuarios registrados.</li>
        {% endfor %}
    </ul>

</body>
</html>
