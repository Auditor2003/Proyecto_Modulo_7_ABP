{% extends 'base.html' %}

{% block content %}

<h2>Historial de transacciones</h2>

<table border="1">
    <tr>
        <th>Fecha</th>
        <th>Usuario</th>
        <th>Beneficiario</th>
        <th>Monto</th>
    </tr>

    {% for t in transacciones %}
    <tr>
        <td>{{ t.fecha_transaccion }}</td>
        <td>{{ t.id_usuario_emisor.nombre }}</td>
        <td>{{ t.id_beneficiario.nombre }}</td>
        <td>{{ t.importe }}</td>
    </tr>
    {% endfor %}
</table>

<a href="{% url 'transaccion_create' %}">Nueva transacción</a>

{% endblock %}
