{% extends 'base.html' %}

{% block content %}

<h2>Confirmar eliminación</h2>

<p>¿Seguro que deseas eliminar a {{ object.nombre }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
</form>

<a href="{% url 'beneficiario_list' %}">Cancelar</a>

{% endblock %}
