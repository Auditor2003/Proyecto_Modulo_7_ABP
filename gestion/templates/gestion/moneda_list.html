{% extends 'base.html' %}

{% block content %}

<div class="card">

    <h2>Monedas</h2>

    <a href="{% url 'moneda_create' %}" class="nav-btn primary">
        + Nueva moneda
    </a>

    <ul style="margin-top:20px; padding:0; list-style:none;">
        {% for m in monedas %}
        <li style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #eee;">

            <span>
                <strong>{{ m.nombre_moneda }}</strong> ({{ m.simbolo }})
            </span>

            <div style="display:flex; gap:8px;">

                <a href="{% url 'moneda_update' m.pk %}" 
                   class="nav-btn primary">
                    Editar
                </a>

                <a href="{% url 'moneda_delete' m.pk %}" 
                   class="nav-btn danger">
                    Eliminar
                </a>

            </div>

        </li>

        {% empty %}
        <li style="margin-top:10px;">No hay monedas registradas</li>
        {% endfor %}
    </ul>

</div>

{% endblock %}
