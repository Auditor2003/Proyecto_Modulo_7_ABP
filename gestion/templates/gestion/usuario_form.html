{% extends 'base.html' %}

{% block content %}
<title>Crear Usuario</title>



    <h1>Crear Usuario</h1>

    <!-- Aquí creo el formulario que Django genera automáticamente -->
    <form method="post">
        {% csrf_token %}

        <!-- Aquí renderizo todos los campos del modelo -->
        {{ form.as_p }}

        <button type="submit">Guardar</button>
    </form>

    <br>

    <!-- Aquí dejo un enlace para volver a la lista -->
    <a href="{% url 'usuario_list' %}">Volver a la lista</a>

{% endblock %}
